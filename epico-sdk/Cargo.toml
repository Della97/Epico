[package]
name = "epico-sdk"
version = "0.1.0"
edition = "2021"
description = "Developer SDK for writing epico stages as typed components"

[lib]
# Plain rlib. Target is whatever the stage crate targets (typically
# wasm32-wasip2). This crate has no runtime footprint — it's almost
# entirely declarative macros that expand inside the stage crate's own
# namespace, where wit-bindgen has already generated the types.
crate-type = ["rlib"]

[dependencies]
# None. The SDK leans on wit-bindgen which the stage crate pulls in
# directly (see stage Cargo.toml generated by the CLI).
