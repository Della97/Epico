# Example Epico pipeline in the new single-file format.
# Compare to dags/pipeline.yaml (old format) to see the reduction.
#
# Every field is optional except stages[].name and stages[].src.
# Defaults here are picked for a low-latency stream FaaS.

package: epico:temps@1.0.0

# Physical nodes. Each node has a name (referenced by `placement` below
# and by `deploy.this_host`) and an IP/hostname.
nodes:
  - name: local
    host: 127.0.0.1
    force_tcp: false

# Typed records. Each stage declares which type it consumes (`in:`)
# and which it produces (`out:`).
types:
  reading:
    sensor_id: string
    value:     f64
    unit:      string?
  enriched:
    sensor_id: string
    value:     f64
    anomaly:   bool?
    severity:  string?

# source:
#   kind: loadgen
#   rate: 500
#   duration: 180
#   profile: wave
#   wave_min: 400
#   wave_period: 120

# source:
#   kind: loadgen
#   rate: 500
#   duration: 180
#   profile: steady
#   sensors: 50

# Sinusoidal load: trough=3k EPS, peak=100k EPS, 40s period, 180s total.
# Three stages with deliberately different scaling policies so that each
# dispatcher queue reacts to the same wave at a different speed.
source:
  kind: loadgen
  profile: wave
  rate: 100000
  wave_min: 3000
  wave_period: 40
  duration: 180
  sensors: 100

# The pipeline. `warmup` is an identity pass-through whose only job is to
# absorb the first-stage process warmup costs (page-cache miss on the
# .wasm/.cwasm, first pthread_create, ZMQ I/O thread spawn, first event
# arrival). Without it, the leading real stage shows inflated cold_start
# numbers that contaminate AOT/JIT comparisons.
stages:
  - name: normalize
    placement: local
    in:  reading
    out: reading
    src: ./stages/normalize.rs
    scaling:
      min: 1
      max: 8
      queue_up: 100
      queue_down: 10
      cooldown_up_s: 1
      cooldown_down_s: 3

  - name: detect
    placement: local
    in:  reading
    out: enriched
    src: ./stages/detect.rs
    scaling:
      min: 1
      max: 8
      queue_up: 200
      queue_down: 20
      cooldown_up_s: 2
      cooldown_down_s: 6

  - name: finalize
    placement: local
    in:  enriched
    out: enriched
    src: ./stages/finalize.rs
    scaling:
      min: 1
      max: 8
      queue_up: 400
      queue_down: 40
      cooldown_up_s: 3
      cooldown_down_s: 12

edges:
  - normalize -> detect
  - detect -> finalize

deploy:
  ingress: ipc:///tmp/epico-dispatch-normalize-push
  collector: tcp://localhost:9999
  credit_window: 16
  port_base: 9100
  host: localhost
  this_host: local
  resource_sample_interval_ms: 0
