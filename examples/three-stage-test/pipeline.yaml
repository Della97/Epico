# Example Epico pipeline in the new single-file format.
# Compare to dags/pipeline.yaml (old format) to see the reduction.
#
# Every field is optional except stages[].name and stages[].src.
# Defaults here are picked for a low-latency stream FaaS.

package: epico:temps@1.0.0

variables:
  default_min: &min_replicas 3
  default_max: &max_replicas 3

# Physical nodes. Each node has a name (referenced by `placement` below
# and by `deploy.this_host`) and an IP/hostname.
nodes:
  - name: local
    host: 127.0.0.1
    force_tcp: false

# Typed records. Each stage declares which type it consumes (`in:`)
# and which it produces (`out:`).
types:
  reading:
    sensor_id: string
    value:     f64
    unit:      string?
  enriched:
    sensor_id: string
    value:     f64
    anomaly:   bool?
    severity:  string?

# source:
#   kind: loadgen
#   rate: 500
#   duration: 180
#   profile: wave
#   wave_min: 400
#   wave_period: 120

# source:
#   kind: loadgen
#   rate: 5000
#   duration: 180
#   profile: steady
#   sensors: 50

# source:
#   kind: loadgen
#   profile: tp
#   count: 5000000

sink:
  placement: local
  src: ./stages/sink.rs

source:
  placement: local
  src: ./stages/source.rs

# The pipeline. `warmup` is an identity pass-through whose only job is to
# absorb the first-stage process warmup costs (page-cache miss on the
# .wasm/.cwasm, first pthread_create, ZMQ I/O thread spawn, first event
# arrival). Without it, the leading real stage shows inflated cold_start
# numbers that contaminate AOT/JIT comparisons.
stages:
  - name: normalize
    placement: local
    in:  reading
    out: reading
    src: ./stages/normalize.rs
    scaling:
      min: *min_replicas
      max: *max_replicas
      queue_up: 50
      cooldown_up_s: 20
      cooldown_down_s: 20

  - name: detect
    placement: local
    in:  reading
    out: enriched
    src: ./stages/detect.rs
    scaling:
      min: *min_replicas
      max: *max_replicas
      queue_up: 50
      cooldown_up_s: 20
      cooldown_down_s: 20

  - name: finalize
    placement: local
    in:  enriched
    out: enriched
    src: ./stages/finalize.rs
    scaling:
      min: *min_replicas
      max: *max_replicas
      queue_up: 50
      cooldown_up_s: 20
      cooldown_down_s: 20

edges:
  - normalize -> detect
  - detect -> finalize

deploy:
  host: localhost
  this_host: local
  # Binary ingest from the native in-process source (roadmap item 2). The agent
  # bridges this onto EPICO_SOURCE_FORMAT so stages/source.rs emits the binary
  # envelope. Remove the line (or set `json`) for the JSON baseline arm.
  source_format: binary
