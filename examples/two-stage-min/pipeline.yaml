# two-stage-min — minimal-compute pipeline for transport throughput tests.
#
# Two identity stages over the smallest practical record. The WASM body does
# nothing, so per-event cost is just the fixed stage boundary (decode -> WIT ->
# encode, ~1 µs) and the transport under test on the single interior hop
# relay -> forward. Ingress (loadgen -> first stage) and egress (collector) are
# driven in-process, so any throughput difference between edge transports is
# attributable to that one hop alone.
#
# Run standalone:        epico run
# Run the A/B harness:   bench/tp_bench_2stage.sh   (overrides deploy fields)

package: epico:minbench@1.0.0

nodes:
  - name: local
    host: 127.0.0.1
    force_tcp: false

# One record type, reused for in: and out: of both stages. Two fields keeps
# conversion close to the floor. Do NOT name this type `event` — that triggers
# the legacy all-optional shared record and skips typed dispatch.
types:
  msg:
    sensor_id: string
    value:     f64

# Loadgen source — emits 500 k events at full blast, then sends EOS.
# At ~100 k ev/s (WASM-call-limited for identity stages), this drains
# in ~5 s — well within the 30 s EOS drain grace. The bench harness
# (bench/tp_bench_2stage.sh) overrides count for longer runs.
source:
  kind: loadgen
  profile: tp
  count: 500000
  sensors: 100
  blast: true

stages:
  - name: relay
    placement: local
    in:  msg
    out: msg
    src: ./stages/relay.rs
    scaling: { min: 3, max: 3, queue_up: 50, cooldown_up_s: 20, cooldown_down_s: 20 }

  - name: forward
    placement: local
    in:  msg
    out: msg
    src: ./stages/forward.rs
    scaling: { min: 3, max: 3, queue_up: 50, cooldown_up_s: 20, cooldown_down_s: 20 }

edges:
  - relay -> forward

deploy:
  host: localhost
  this_host: local
  ingress: ipc:///tmp/epico-minbench-push

  # ── Transport ──────────────────────────────────────────────────────────────
  # Binary envelope for both source ingress and interior edges. No JSON parse
  # at any stage boundary — only the compact binary row codec is in the path.
  # These are now the defaults; shown here explicitly for clarity.
  source_format: binary
  event_format:  binary

  # ── In-process fabric ──────────────────────────────────────────────────────
  # Replace the ZMQ ingress dispatcher with a direct source→edge pump and
  # drain the collector from the last stage's edge in-process. Zero sockets
  # in the data path on a single host.
  ingress_mode: inprocess

  # SPSC mesh for the relay→forward interior hop. One lock-free ring per
  # producer/consumer pair; no shared state between concurrent replicas.
  # Switch to `mpmc` (crossbeam bounded ring) to benchmark that transport,
  # or `zmq` to restore the full dispatcher path for a like-for-like comparison.
  edge_impl: spsc
  # Slot capacity of each individual SPSC ring. 512 slots gives the
  # producer ample room to burst ahead without triggering backpressure
  # sleep (50 µs penalty per full-ring stall).
  spsc_ring_cap: 512

  # ── Flow control ──────────────────────────────────────────────────────────
  credit_window: 16
  batch_events:  1

  # ── Telemetry ──────────────────────────────────────────────────────────────
  # Disable resource sampler (no sysinfo/Mach jitter in latency numbers).
  resource_sample_interval_ms: 0
