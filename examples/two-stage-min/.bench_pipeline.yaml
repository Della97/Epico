package: epico:minbench@1.0.0
nodes:
  - name: local
    host: 127.0.0.1
    force_tcp: false
types:
  event:
    sensor_id: string
    value:     f64
source:
  kind: loadgen
  profile: tp
  rate: 1000
  count: 50000
  duration: 0
  sensors: 100

stages:
  - name: relay
    placement: local
    in:  event
    out: event
    src: ./stages/relay.rs
    scaling: { min: 1, max: 1, queue_up: 50, cooldown_up_s: 20, cooldown_down_s: 20 }
  - name: forward
    placement: local
    in:  event
    out: event
    src: ./stages/forward.rs
    scaling: { min: 1, max: 1, queue_up: 50, cooldown_up_s: 20, cooldown_down_s: 20 }
edges:
  - relay -> forward
deploy:
  host: localhost
  this_host: local
  ingress: ipc:///tmp/epico-minbench-push
  credit_window: 16
  batch_events: 1
  resource_sample_interval_ms: 0
